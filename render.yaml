services:
  - type: web
    name: recallflow-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install asyncpg
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
